<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stray K-Pop Games</title>
    <link rel="stylesheet" href="./css/styles.css"> 
    <script src="./scripts/script.js" defer></script>
</head>
<body>
    <h1>Stray7 K-Pop Idol Games</h1>
    <div class="game-modes">
        <div class="mode">
            <img src="./assets/images/0index_draft.png" alt="Draft Mode" class="mode-image">
            <button onclick="irParaDraft()" class="draft-btn">Draft</button>
        </div>
        <div class="mode">
            <img src="./assets/images/0index_quiz.png" alt="Quiz Mode" class="mode-image">
            <button onclick="modoEmDesenvolvimento()" disabled class="disabled-btn">Quiz (em breve)</button>
        </div>
        <div class="mode">
            <img src="./assets/images/0index_gacha.jpg" alt="Gacha Mode" class="mode-image">
            <button onclick="modoEmDesenvolvimento()" disabled class="disabled-btn">Gacha (em breve)</button>
        </div>
        <div class="mode">
            <img src="./assets/images/0index_manager.png" alt="Manager Mode" class="mode-image">
            <button onclick="modoEmDesenvolvimento()" disabled class="disabled-btn">Manager (em breve)</button>
        </div>
    </div>
</body>
</html>
